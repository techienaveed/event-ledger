server:
  port: 8081

spring:

  application:
    name: account-service

  datasource:
    url: jdbc:h2:mem:accountdb

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update

management:

  tracing:

    enabled: true

    sampling:

      probability: 1.0

  endpoints:

    web:

      exposure:

        include: health,metrics,prometheus
